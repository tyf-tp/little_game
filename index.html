<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>谜境逃脱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: none;
    }
    
    /* 强制横屏提示 */
    #rotate-hint {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a2e;
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #fff;
    }
    #rotate-hint span { font-size: 60px; margin-bottom: 20px; }
    #rotate-hint p { color: #4a9eff; }
    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-hint { display: flex; }
      .screen { display: none !important; }
    }
    
    .screen { display: none; min-height: 100vh; padding: 20px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .btn {
      padding: 15px 40px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #16213e; color: #fff; border: 2px solid #4a9eff; }
    
    .input {
      width: 280px;
      padding: 15px;
      margin: 10px 0;
      font-size: 16px;
      border: 2px solid #333;
      border-radius: 10px;
      background: #16213e;
      color: #fff;
      outline: none;
    }
    .input:focus { border-color: #4a9eff; }
    
    .title { font-size: 36px; font-weight: bold; margin-bottom: 30px; color: #e94560; text-shadow: 0 0 20px rgba(233,69,96,0.5); }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
    .error { color: #e94560; font-size: 14px; margin-top: 10px; }
    
    #game-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* 游戏画布 */
    #game-canvas {
      background: #5c94fc;
      border-radius: 10px;
      border: 3px solid #333;
      touch-action: none;
      max-width: 100%;
    }
    
    #scene-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 10px;
      font-size: 14px;
    }
    #scene-name { font-weight: bold; color: #4a9eff; }
    #coin-count { color: #ffd700; }
    
    /* 移动端控制 */
    #mobile-controls {
      width: 100%;
      display: none;
      justify-content: space-between;
      padding: 15px 10px;
      margin-top: 10px;
    }
    @media (max-width: 900px) { #mobile-controls { display: flex; } }
    
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(2, 60px);
      gap: 5px;
    }
    .dpad-btn {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }
    .dpad-btn:active { background: rgba(255,255,255,0.5); transform: scale(0.95); }
    .dpad-empty { visibility: hidden; }
    
    #action-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .action-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }
    #btn-jump {
      background: #4CAF50;
      border: 3px solid #81C784;
    }
    #btn-jump:active { background: #388E3C; }
    #btn-inventory {
      background: #FF9800;
      border: 3px solid #FFB74D;
    }
    #btn-inventory:active { background: #F57C00; }
    
    /* Web端提示 */
    #web-hint {
      display: none;
      background: #0f0f23;
      padding: 8px 15px;
      font-size: 12px;
      color: #4a9eff;
      text-align: center;
      width: 100%;
      border-radius: 5px;
      margin-top: 10px;
    }
    @media (min-width: 901px) { #web-hint { display: block; } }
    
    /* 对话框 */
    #dialog-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #dialog-overlay.show { display: flex; }
    #dialog-box {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 15px;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      text-align: center;
    }
    #dialog-text { font-size: 16px; line-height: 1.6; margin-bottom: 15px; }
    
    /* 暂停菜单 */
    #pause-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 150;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #pause-overlay.show { display: flex; }
    
    /* 背包 */
    #inventory-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #inventory-overlay.show { display: flex; }
    #inventory-box {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 20px;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      max-height: 70vh;
      overflow-y: auto;
    }
    #inventory-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .inv-item {
      background: #0f0f23;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
    }
    .inv-icon { font-size: 32px; }
    .inv-name { font-size: 11px; margin-top: 5px; color: #fff; }
  </style>
</head>
<body>
<!-- 横屏提示 -->
<div id="rotate-hint">
  <span>📱</span>
  <p>请将手机旋转至横屏</p>
</div>

<!-- 登录界面 -->
<div id="login-screen" class="screen active">
  <h1 class="title">谜境逃脱</h1>
  <p class="subtitle">探索未知的谜境世界</p>
  <input type="text" id="login-username" class="input" placeholder="用户名" autocomplete="username">
  <input type="password" id="login-password" class="input" placeholder="密码" autocomplete="current-password">
  <label style="display:flex; align-items:center; gap:8px; margin:10px 0; color:#666; font-size:14px; cursor:pointer;">
    <input type="checkbox" id="remember-me" style="width:18px; height:18px;">
    记住密码
  </label>
  <button class="btn btn-primary" onclick="login()">登录</button>
  <button class="btn btn-secondary" onclick="showScreen('register-screen')">注册账号</button>
  <p class="error" id="login-error"></p>
</div>

<!-- 注册界面 -->
<div id="register-screen" class="screen">
  <h1 class="title">注册</h1>
  <input type="text" id="reg-username" class="input" placeholder="用户名">
  <input type="password" id="reg-password" class="input" placeholder="密码">
  <input type="password" id="reg-password2" class="input" placeholder="确认密码">
  <button class="btn btn-primary" onclick="register()">注册</button>
  <button class="btn btn-secondary" onclick="showScreen('login-screen')">返回登录</button>
  <p class="error" id="reg-error"></p>
</div>

<!-- 主菜单 -->
<div id="menu-screen" class="screen">
  <h1 class="title">谜境逃脱</h1>
  <p id="welcome-text">欢迎回来</p>
  <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
  <button class="btn btn-secondary" onclick="loadGame()">继续游戏</button>
  <button class="btn btn-secondary" onclick="logout()">退出登录</button>
</div>

<!-- 游戏界面 -->
<div id="game-screen" class="screen">
  <div id="game-container">
    <div id="scene-header">
      <span id="scene-name">第1关</span>
      <span id="coin-count">金币: 0</span>
    </div>
    <canvas id="game-canvas" width="800" height="400"></canvas>
    <div id="web-hint">方向键/WASD 移动 | 空格 跳跃 | ESC 暂停</div>
    <div id="mobile-controls">
      <div id="dpad">
        <div class="dpad-empty"></div>
        <div class="dpad-empty"></div>
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-down">▼</div>
        <div class="dpad-btn" id="btn-right">▶</div>
      </div>
      <div id="action-buttons">
        <div class="action-btn" id="btn-jump">🏃</div>
        <div class="action-btn" id="btn-inventory">📦</div>
      </div>
    </div>
  </div>
</div>

<!-- 对话框 -->
<div id="dialog-overlay">
  <div id="dialog-box">
    <p id="dialog-text"></p>
    <button class="btn btn-primary" onclick="closeDialog()">确定</button>
  </div>
</div>

<!-- 暂停菜单 -->
<div id="pause-overlay">
  <h2 style="margin-bottom:20px;">游戏暂停</h2>
  <button class="btn btn-primary" onclick="closePause()">继续</button>
  <button class="btn btn-secondary" onclick="saveGame()">保存</button>
  <button class="btn btn-secondary" onclick="quitGame()">退出</button>
</div>

<!-- 背包 -->
<div id="inventory-overlay">
  <div id="inventory-box">
    <div id="inventory-header">
      <span id="inventory-title">背包</span>
      <span onclick="toggleInventory()" style="cursor:pointer; font-size:24px; color:#e94560;">✕</span>
    </div>
    <div id="inventory-grid"></div>
  </div>
</div>

};

// ==================== 游戏状态 ====================
let currentUser = null;
let currentLevel = "level1";
let canvas, ctx;
let gameRunning = false;
let animationId = null;

// 玩家状态
let player = {
  x: 50, y: 300,
  vx: 0, vy: 0,
  width: 28, height: 32,
  onGround: false,
  facing: 1,
  coins: 0,
  inventory: [],
  poweredUp: false
};

// 关卡数据（运行时）
let platforms = [];
let hiddenBlocks = [];
let coins = [];
let particles = [];

// 相机
let camera = { x: 0 };

// 按键状态
let keys = {
  left: false,
  right: false,
  down: false
};

// 移动端跳跃状态
let jumpPressed = false;

// ==================== 初始化 ====================
function init() {
  checkAuth();
  setupKeyboard();
  setupMobileControls();
}

function checkAuth() {
  const savedUsername = localStorage.getItem("puzzle_game_remember_user");
  const savedPassword = localStorage.getItem("puzzle_game_remember_pass");
  
  if (savedUsername) document.getElementById("login-username").value = savedUsername;
  if (savedPassword) {
    document.getElementById("login-password").value = savedPassword;
    document.getElementById("remember-me").checked = true;
  }
  
  showScreen("login-screen");
}

function setupKeyboard() {
  document.addEventListener("keydown", (e) => {
    if (document.getElementById("dialog-overlay").classList.contains("show")) return;
    if (document.getElementById("inventory-overlay").classList.contains("show")) {
      if (e.key === "Escape") toggleInventory();
      return;
    }
    if (document.getElementById("pause-overlay").classList.contains("show")) {
      if (e.key === "Escape") closePause();
      return;
    }
    
    switch (e.key.toLowerCase()) {
      case "a": case "arrowleft": keys.left = true; break;
      case "d": case "arrowright": keys.right = true; break;
      case "s": case "arrowdown": keys.down = true; break;
      case "w": case " ":
        if (player.onGround) playerJump();
        break;
      case "escape": showPause(); break;
      case "i": toggleInventory(); break;
    }
  });
  
  document.addEventListener("keyup", (e) => {
    switch (e.key.toLowerCase()) {
      case "a": case "arrowleft": keys.left = false; break;
      case "d": case "arrowright": keys.right = false; break;
      case "s": case "arrowdown": keys.down = false; break;
    }
  });
}

function setupMobileControls() {
  const btnLeft = document.getElementById("btn-left");
  const btnRight = document.getElementById("btn-right");
  const btnDown = document.getElementById("btn-down");
  const btnJump = document.getElementById("btn-jump");
  const btnInventory = document.getElementById("btn-inventory");
  
  // 左按钮
  btnLeft.addEventListener("touchstart", (e) => { e.preventDefault(); keys.left = true; }, { passive: false });
  btnLeft.addEventListener("touchend", (e) => { e.preventDefault(); keys.left = false; }, { passive: false });
  btnLeft.addEventListener("mousedown", () => keys.left = true);
  btnLeft.addEventListener("mouseup", () => keys.left = false);
  btnLeft.addEventListener("mouseleave", () => keys.left = false);
  
  // 右按钮
  btnRight.addEventListener("touchstart", (e) => { e.preventDefault(); keys.right = true; }, { passive: false });
  btnRight.addEventListener("touchend", (e) => { e.preventDefault(); keys.right = false; }, { passive: false });
  btnRight.addEventListener("mousedown", () => keys.right = true);
  btnRight.addEventListener("mouseup", () => keys.right = false);
  btnRight.addEventListener("mouseleave", () => keys.right = false);
  
  // 下按钮（用于下蹲或下落）
  btnDown.addEventListener("touchstart", (e) => { e.preventDefault(); keys.down = true; }, { passive: false });
  btnDown.addEventListener("touchend", (e) => { e.preventDefault(); keys.down = false; }, { passive: false });
  btnDown.addEventListener("mousedown", () => keys.down = true);
  btnDown.addEventListener("mouseup", () => keys.down = false);
  btnDown.addEventListener("mouseleave", () => keys.down = false);
  
  // 跳跃按钮
  btnJump.addEventListener("touchstart", (e) => { e.preventDefault(); if (player.onGround) playerJump(); }, { passive: false });
  btnJump.addEventListener("click", () => { if (player.onGround) playerJump(); });
  
  // 背包按钮
  btnInventory.addEventListener("touchstart", (e) => { e.preventDefault(); toggleInventory(); }, { passive: false });
  btnInventory.addEventListener("click", () => toggleInventory());
}

// ==================== 屏幕切换 ====================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  
  if (id === "game-screen" && !gameRunning) {
    canvas = document.getElementById("game-canvas");
    ctx = canvas.getContext("2d");
    startGameLoop();
  } else if (id !== "game-screen" && gameRunning) {
    stopGameLoop();
  }
}

// ==================== 认证 ====================
function login() {
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value;
  const remember = document.getElementById("remember-me").checked;
  const error = document.getElementById("login-error");
  
  if (!username || !password) {
    error.textContent = "请输入用户名和密码";
    return;
  }
  
  const users = JSON.parse(localStorage.getItem("puzzle_game_users") || "{}");
  if (users[username] && users[username].password === password) {
    currentUser = { username, created: users[username].created };
    
    if (remember) {
      localStorage.setItem("puzzle_game_remember_user", username);
      localStorage.setItem("puzzle_game_remember_pass", password);
    } else {
      localStorage.removeItem("puzzle_game_remember_user");
      localStorage.removeItem("puzzle_game_remember_pass");
    }
    
    showScreen("menu-screen");
    document.getElementById("welcome-text").textContent = `欢迎回来，${username}`;
    error.textContent = "";
  } else {
    error.textContent = "用户名或密码错误";
  }
}

function register() {
  const username = document.getElementById("reg-username").value.trim();
  const password = document.getElementById("reg-password").value;
  const password2 = document.getElementById("reg-password2").value;
  const error = document.getElementById("reg-error");
  
  if (!username || !password) {
    error.textContent = "请填写所有字段";
    return;
  }
  if (password !== password2) {
    error.textContent = "两次密码不一致";
    return;
  }
  if (password.length < 4) {
    error.textContent = "密码至少4位";
    return;
  }
  
  const users = JSON.parse(localStorage.getItem("puzzle_game_users") || "{}");
  if (users[username]) {
    error.textContent = "用户名已存在";
    return;
  }
  
  users[username] = { password, created: Date.now() };
  localStorage.setItem("puzzle_game_users", JSON.stringify(users));
  error.textContent = "";
  alert("注册成功！请登录");
  showScreen("login-screen");
}

function logout() {
  currentUser = null;
  showScreen("login-screen");
}

// ==================== 游戏逻辑 ====================
function startGame() {
  player = {
    x: 50, y: 300,
    vx: 0, vy: 0,
    width: 28, height: 32,
    onGround: false,
    facing: 1,
    coins: 0,
    inventory: [],
    poweredUp: false
  };
  
  loadLevel(currentLevel);
  showScreen("game-screen");
  updateUI();
}

function loadGame() {
  if (!currentUser) return;
  const saves = JSON.parse(localStorage.getItem(`save_${currentUser.username}`) || "null");
  if (saves) {
    player = saves.player;
    currentLevel = saves.level || "level1";
    loadLevel(currentLevel);
    showScreen("game-screen");
    updateUI();
  } else {
    startGame();
  }
}

function loadLevel(levelId) {
  const level = LEVELS[levelId];
  if (!level) return;
  
  // 初始化平台
  platforms = level.platforms.map(p => ({...p}));
  
  // 初始化隐藏方块
  hiddenBlocks = level.hiddenBlocks.map(b => ({...b}));
  
  // 初始化金币
  coins = level.coins.map(c => ({...c, collected: false}));
  
  // 重置玩家位置
  player.x = level.playerStart.x;
  player.y = level.playerStart.y;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  
  // 重置相机
  camera.x = 0;
  
  // 清空粒子
  particles = [];
}

function startGameLoop() {
  gameRunning = true;
  gameLoop();
}

function stopGameLoop() {
  gameRunning = false;
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
}

function gameLoop() {
  if (!gameRunning) return;
  
  update();
  render();
  animationId = requestAnimationFrame(gameLoop);
}

function update() {
  // 水平移动
  if (keys.left) {
    player.vx = -MOVE_SPEED;
    player.facing = -1;
  } else if (keys.right) {
    player.vx = MOVE_SPEED;
    player.facing = 1;
  } else {
    player.vx *= 0.8;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }
  
  // 重力
  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;
  
  // 移动和碰撞
  player.x += player.vx;
  player.y += player.vy;
  
  // 平台碰撞
  player.onGround = false;
  for (const plat of platforms) {
    if (rectCollision(player, plat)) {
      // 从上面落下
      if (player.vy > 0) {
        const prevBottom = player.y + player.height - player.vy;
        if (prevBottom <= plat.y + 5) {
          player.y = plat.y - player.height;
          player.vy = 0;
          player.onGround = true;
          continue;
        }
      }
      // 从下面撞到
      if (player.vy < 0) {
        const prevTop = player.y - player.vy;
        if (prevTop >= plat.y + plat.h - 5) {
          player.y = plat.y + plat.h;
          player.vy = 0;
          continue;
        }
      }
      // 左右碰撞
      if (player.vx > 0) {
        player.x = plat.x - player.width;
      } else if (player.vx < 0) {
        player.x = plat.x + plat.w;
      }
    }
  }
  
  // 隐藏方块碰撞（只有已揭示的才能站上去）
  for (const block of hiddenBlocks) {
    if (!block.revealed) continue;
    if (rectCollision(player, block)) {
      if (player.vy > 0) {
        const prevBottom = player.y + player.height - player.vy;
        if (prevBottom <= block.y + 5) {
          player.y = block.y - player.height;
          player.vy = 0;
          player.onGround = true;
        }
      }
    }
  }
  
  // 头顶撞隐藏方块
  for (const block of hiddenBlocks) {
    if (player.vy < 0) {
      const headBox = { x: player.x, y: player.y - player.vy - 5, width: player.width, height: 10 };
      if (rectCollision(headBox, block)) {
        revealBlock(block);
        player.vy = 2; // 轻微弹回
      }
    }
  }
  
  // 金币碰撞
  for (const coin of coins) {
    if (coin.collected) continue;
    if (rectCollision(player, { x: coin.x, y: coin.y, width: 24, height: 24 })) {
      coin.collected = true;
      player.coins++;
      createParticles(coin.x + 12, coin.y + 12, "#ffd700", 5);
      updateUI();
    }
  }
  
  // 粒子更新
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    return p.life > 0;
  });
  
  // 相机跟随 - 平滑跟随玩家
  const targetCam = player.x - CANVAS_WIDTH / 3;
  const levelWidth = LEVELS[currentLevel]?.width || CANVAS_WIDTH;
  camera.x += (targetCam - camera.x) * 0.1; // 平滑插值
  camera.x = Math.max(0, Math.min(camera.x, levelWidth - CANVAS_WIDTH));
  
  // 边界检测
  if (player.x < 0) player.x = 0;
  if (player.x > levelWidth - player.width) player.x = levelWidth - player.width;
  
  // 掉落了
  if (player.y > CANVAS_HEIGHT + 50) {
    player.x = LEVELS[currentLevel].playerStart.x;
    player.y = LEVELS[currentLevel].playerStart.y;
    player.vy = 0;
    player.vx = 0;
  }
  
  // 到达终点
  const level = LEVELS[currentLevel];
  if (level && rectCollision(player, level.goal)) {
    nextLevel();
  }
}

function revealBlock(block) {
  if (block.revealed) return;
  block.revealed = true;
  createParticles(block.x + 16, block.y + 16, "#ffd700", 8);
  
  if (block.contains === "coin") {
    player.coins++;
    updateUI();
  } else if (block.contains === "mushroom") {
    player.poweredUp = true;
    player.height = 44;
    player.y -= 12;
  } else if (block.contains === "flower") {
    player.poweredUp = true;
    player.height = 44;
    player.y -= 12;
  }
}

function playerJump() {
  if (player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }
}

function nextLevel() {
  if (currentLevel === "level1") {
    currentLevel = "level2";
    loadLevel(currentLevel);
    updateUI();
    showDialog("进入第2关！");
  } else {
    showDialog("🎉 恭喜通关！\n\n金币：" + player.coins);
  }
}

function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      color,
      size: Math.random() * 4 + 2,
      life: 30
    });
  }
}

function rectCollision(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.width > b.x &&
         a.y < b.y + b.h &&
         a.y + a.height > b.y;
}

// ==================== 渲染 ====================
function render() {
  const level = LEVELS[currentLevel];
  if (!level) return;
  
  // 清空画布
  ctx.fillStyle = level.background;
  ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  
  ctx.save();
  ctx.translate(-Math.round(camera.x), 0);
  
  // 绘制地面
  for (const plat of platforms) {
    if (plat.type === "ground") {
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
      ctx.fillStyle = "#228B22";
      ctx.fillRect(plat.x, plat.y, plat.w, 8);
      // 草丛
      ctx.fillStyle = "#32CD32";
      for (let i = 0; i < plat.w; i += 8) {
        if (Math.random() > 0.7) {
          ctx.fillRect(plat.x + i, plat.y - 3, 2, 5);
        }
      }
    } else {
      ctx.fillStyle = "#CD853F";
      ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
      ctx.strokeStyle = "#8B4513";
      ctx.lineWidth = 2;
      ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
      // 砖块纹理
      ctx.fillStyle = "#DEB887";
      for (let i = 0; i < plat.w; i += 32) {
        for (let j = 0; j < plat.h; j += 16) {
          ctx.fillRect(plat.x + i + 2, plat.y + j + 2, 28, 12);
        }
      }
    }
  }
  
  // 绘制隐藏方块
  for (const block of hiddenBlocks) {
    if (block.revealed) {
      // 已揭示的方块变成普通砖块
      ctx.fillStyle = "#CD853F";
      ctx.fillRect(block.x, block.y, block.w, block.h);
      ctx.strokeStyle = "#8B4513";
      ctx.lineWidth = 2;
      ctx.strokeRect(block.x, block.y, block.w, block.h);
    } else {
      // 问号方块
      ctx.fillStyle = "#FFD700";
      ctx.fillRect(block.x, block.y, block.w, block.h);
      ctx.fillStyle = "#FFA500";
      ctx.fillRect(block.x, block.y, block.w, 4);
      // 问号
      ctx.fillStyle = "#FFFFFF";
      ctx.font = "bold 22px Arial";
      ctx.textAlign = "center";
      ctx.fillText("?", block.x + 16, block.y + 25);
      ctx.textAlign = "left";
    }
  }
  
  // 绘制金币
  for (const coin of coins) {
    if (coin.collected) continue;
    // 金币发光
    ctx.fillStyle = "#FFD700";
    ctx.beginPath();
    ctx.arc(coin.x + 12, coin.y + 12, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#FFF59D";
    ctx.beginPath();
    ctx.arc(coin.x + 10, coin.y + 10, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // 绘制管道
  if (level.pipes) {
    for (const pipe of level.pipes) {
      // 管道顶部
      ctx.fillStyle = "#228B22";
      ctx.fillRect(pipe.x, pipe.y, 48, 16);
      ctx.fillStyle = "#32CD32";
      ctx.fillRect(pipe.x + 2, pipe.y + 2, 8, 12);
      // 管道身
      ctx.fillStyle = "#32CD32";
      ctx.fillRect(pipe.x, pipe.y + 16, 48, pipe.h - 16);
      ctx.fillStyle = "#228B22";
      ctx.fillRect(pipe.x, pipe.y + 16, 8, pipe.h - 16);
    }
  }
  
  // 绘制终点旗杆
  if (level.goal) {
    // 旗杆
    ctx.fillStyle = "#228B22";
    ctx.fillRect(level.goal.x + 28, level.goal.y - 50, 8, level.goal.h + 50);
    // 旗子
    ctx.fillStyle = "#FF4444";
    ctx.fillRect(level.goal.x + 8, level.goal.y - 50, 48, 32);
    // 旗子图案
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "18px Arial";
    ctx.fillText("🏁", level.goal.x + 16, level.goal.y - 25);
  }
  
  // 绘制粒子
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 30;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // 绘制玩家
  const px = Math.round(player.x);
  const py = Math.round(player.y);
  
  // 身体
  ctx.fillStyle = player.poweredUp ? "#FF4444" : "#FF9966";
  ctx.fillRect(px, py, player.width, player.height);
  
  // 帽子
  ctx.fillStyle = "#E94560";
  ctx.fillRect(px, py, player.width, 8);
  if (player.poweredUp) {
    ctx.fillStyle = "#FF0000";
    ctx.fillRect(px - 2, py, player.width + 4, 4);
  }
  
  // 眼睛
  ctx.fillStyle = "#FFF";
  const eyeOffset = player.facing > 0 ? 14 : 4;
  ctx.fillRect(px + eyeOffset, py + 12, 8, 8);
  ctx.fillStyle = "#000";
  ctx.fillRect(px + eyeOffset + (player.facing > 0 ? 4 : 0), py + 14, 4, 4);
  
  // 鞋子
  ctx.fillStyle = "#8B4513";
  if (player.poweredUp) {
    ctx.fillRect(px, py + player.height - 8, player.width, 8);
  } else {
    ctx.fillRect(px, py + player.height - 6, 12, 6);
    ctx.fillRect(px + 16, py + player.height - 6, 12, 6);
  }
  
  ctx.restore();
}

// ==================== UI ====================
function updateUI() {
  document.getElementById("scene-name").textContent = LEVELS[currentLevel]?.name || "游戏";
  document.getElementById("coin-count").textContent = `金币: ${player.coins}`;
}

function showDialog(text) {
  document.getElementById("dialog-text").innerHTML = text.replace(/\n/g, "<br>");
  document.getElementById("dialog-overlay").classList.add("show");
}

function closeDialog() {
  document.getElementById("dialog-overlay").classList.remove("show");
}

function showPause() {
  document.getElementById("pause-overlay").classList.add("show");
}

function closePause() {
  document.getElementById("pause-overlay").classList.remove("show");
}

function saveGame() {
  if (!currentUser) return;
  const saveData = {
    player: { ...player },
    level: currentLevel,
    savedAt: Date.now()
  };
  localStorage.setItem(`save_${currentUser.username}`, JSON.stringify(saveData));
  alert("游戏已保存！");
  closePause();
}

function quitGame() {
  closePause();
  showScreen("menu-screen");
}

function toggleInventory() {
  const overlay = document.getElementById("inventory-overlay");
  if (overlay.classList.contains("show")) {
    overlay.classList.remove("show");
  } else {
    renderInventory();
    overlay.classList.add("show");
  }
}

function renderInventory() {
  const grid = document.getElementById("inventory-grid");
  grid.innerHTML = "";
  
  if (player.coins > 0) {
    grid.innerHTML += `
      <div class="inv-item">
        <div class="inv-icon">🪙</div>
        <div class="inv-name">金币 x${player.coins}</div>
      </div>
    `;
  }
  
  if (player.inventory.length === 0 && player.coins === 0) {
    grid.innerHTML = '<p style="color:#666;text-align:center;grid-column:1/-1;padding:40px;">背包是空的</p>';
  }
}

// ==================== 启动 ====================
window.onload = init;
</script>
